name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ASTRO_TELEMETRY_DISABLED: 1

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Type-check
        run: npm run type-check
      
      - name: Build
        run: npm run build
